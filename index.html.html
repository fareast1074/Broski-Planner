<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Broski Planner</title>

<link rel="stylesheet" href="style.css">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="app">

    <aside class="sidebar">

        <div class="logo">
            📅 Broski Planner
        </div>

        <button id="newEventBtn">
            + New Event
        </button>

        <nav>

            <div class="nav-item active">
                📆 Calendar
            </div>

            <div class="nav-item">
                👥 Team
            </div>

            <div class="nav-item">
                📋 Tasks
            </div>

            <div class="nav-item">
                ⚙ Settings
            </div>

        </nav>

        <div class="sidebar-bottom">

            <button id="darkToggle">
                🌙 Dark Mode
            </button>

            <button id="loginBtn">
                Login with Google
            </button>

            <div id="userInfo"></div>

        </div>

    </aside>

    <main>

        <header class="topbar">

            <button id="prevMonth">
                ◀
            </button>

            <h1 id="monthTitle"></h1>

            <button id="nextMonth">
                ▶
            </button>

        </header>

        <section class="calendar-wrapper">

            <div class="weekdays">

                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>

            </div>

            <div
                id="calendar"
                class="calendar">
            </div>

        </section>

    </main>

</div>

<div id="eventModal" class="modal">

    <div class="modal-content">

        <h2>Create Event</h2>

        <input
            id="eventTitle"
            placeholder="Event title">

        <input
            id="eventTime"
            type="time">

        <select id="eventColor">

            <option value="#6366f1">
                Purple
            </option>

            <option value="#10b981">
                Green
            </option>

            <option value="#ef4444">
                Red
            </option>

            <option value="#f59e0b">
                Orange
            </option>

        </select>

        <button id="saveEvent">
            Save Event
        </button>

    </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
