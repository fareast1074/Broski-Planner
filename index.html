<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Broski Calendar</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <h1>📅 Broski</h1>

    <button id="addBtn">+ Add Event</button>

    <div class="legend">
      <div><span class="dot blue"></span> Work</div>
      <div><span class="dot green"></span> Personal</div>
      <div><span class="dot red"></span> Important</div>
    </div>

  </aside>

  <!-- MAIN -->
  <main>

    <header class="topbar">

      <button id="prev">◀</button>
      <h2 id="monthTitle"></h2>
      <button id="next">▶</button>

    </header>

    <div class="weekdays">
      <div>Sun</div><div>Mon</div><div>Tue</div>
      <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>

    <div id="calendar" class="calendar"></div>

  </main>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">

    <h3>Add Event</h3>

    <input id="title" placeholder="Event title" />
    <input id="time" type="time"/>

    <select id="color">
      <option value="#3b82f6">Blue</option>
      <option value="#22c55e">Green</option>
      <option value="#ef4444">Red</option>
    </select>

    <button id="save">Save</button>

  </div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
